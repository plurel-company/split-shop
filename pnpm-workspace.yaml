packages:
  - .

# pnpm 10.26+ / 11: explicit allow list for dependency install scripts.
allowBuilds:
  "@sentry/cli": true
  esbuild: true
  sharp: true

minimumReleaseAgeExclude:
  - '@plurel/react-sdk@1.0.3'
  - '@plurel/sdk@1.0.3'
  - '@plurel/react-sdk@1.0.4'
  - '@plurel/sdk@1.0.4'

# Kept for pnpm 10.x before allowBuilds (Vercel may use 10.x by project age).
onlyBuiltDependencies:
  - "@sentry/cli"
  - esbuild
  - sharp
  - "@plurel/react-sdk"
  - "@plurel/sdk"
